<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro 3.0</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.timer-container{
    position:relative;
    width:220px;
    height:220px;
}

svg{
    transform:rotate(-90deg);
}

circle{
    fill:none;
    stroke-width:10;
}

.bg{
    stroke:#ddd;
}

.progress{
    stroke:#0d6efd;
    stroke-linecap:round;
    transition:stroke-dashoffset .3s linear;
}

.timer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    font-weight:bold;
}
</style>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Pomodoro 2.0</h1>

    <div class="mb-3">
        <input
                id="minutesSlider"
                type="range"
                value="25"
                min="5"
                max="60"
                step="5"
                class="form-range">
    </div>

    <hr>
    <div class="timer-container">
        
        <svg width="220" height="220">
            <circle class="bg"
                cx="110"
                cy="110"
                r="95">
            </circle>

            <circle
                id="progressCircle"
                class="progress"
                cx="110"
                cy="110"
                r="95">
            </circle>
        </svg>
            <div id="timer" class="timer">25:00</div>
    </div>
        <button id="actionBtn" class="btn btn-primary">Start</button>
        <button id="stopBtn" class="btn btn-primary">Stop</button>

</div>

<script>

    // Progress Circle
    const radius = 95;
    const circumference = 2 * Math.PI * radius;

    const progressCircle = document.getElementById("progressCircle");
    
    progressCircle.style.strokeDasharray = circumference;
    progressCircle.style.strokeDashoffset = circumference;

    




    const slider = document.getElementById("minutesSlider");
    const timer = document.getElementById("timer");
    const actionBtn = document.getElementById("actionBtn");
    const stopBtn = document.getElementById("stopBtn");
    
    let state = "STOPPED";
    let duration = 0;          // tempo total em ms
    let startTime = 0;         // quando iniciou
    let endTime = 0;                // 
    let animationId = null;

    /* =========================
       RENDER (fonte única da verdade)
    ========================= */
    function render() {

        if (!endTime) return;

        const remaining = Math.max(0, endTime - Date.now());

        const total = Math.floor(remaining / 1000);
        const m = Math.floor(total / 60);
        const s = total % 60;

        timer.textContent =
            String(m).padStart(2, "0") + ":" +
            String(s).padStart(2, "0");
        
        const progress = duration ? (1 - remaining / duration) * 100 : 0;

        // Progress Circle fill way
        const offset = circumference - (progress / 100) * circumference;
        progressCircle.style.strokeDashoffset = offset;
        
        if (remaining <= 0) {
            stop();
        }
    }

    /* =========================
       LOOP (1 único)
    ========================= */
    function loop() {
        render();
        animationId = requestAnimationFrame(loop);
    }

    function startLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    /* =========================
       START
    ========================= */
    actionBtn.addEventListener("click",  () => {

        if (state === "STOPPED"){

            duration = slider.value * 60 * 1000;
            startTime = Date.now();
            endTime = startTime + duration;
            

            state = "RUNNING";
            actionBtn.textContent = "Pause";
            slider.disabled = true;

            startLoop();

        } else if (state === "RUNNING") {

            remaining = Math.max(0, endTime - Date.now());
            state = "PAUSED";

            cancelAnimationFrame(animationId);
            animationId = null;
            
            actionBtn.textContent = "Resume";

        }

        else if (state === "PAUSED") {

            endTime = Date.now() + remaining;

            state = "RUNNING";
            actionBtn.textContent = "Pause";


            startLoop();

        }
    });

    /* =========================
       STOP
    ========================= */
    stopBtn.addEventListener("click", stop);

    function stop() {

        state = "STOPPED";

        duration = 0;
        startTime = 0;
        endTime = 0;
        remaining = 0;

        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;

        slider.disabled = false;
        actionBtn.textContent = "Start";

        progressCircle.style.strokeDashoffset = circumference;
        timer.textContent = `${slider.value.padStart(2,"0")}:00`;
    }

    /* =========================
       SLIDER
    ========================= */
    slider.addEventListener("input", () => {
        if (state === "STOPPED") {
            timer.textContent = `${slider.value.padStart(2,"0")}:00`;
        }
    });

</script>

</body>
</html>
