<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<style>
    .progress-bar{
    transition: width 0.3s linear;
}
</style>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Pomodoro 2.0</h1>

    <div class="mb-3">
        <input
                id="minutesSlider"
                type="range"
                value="25"
                min="5"
                max="60"
                step="5"
                class="form-range">
    </div>

    <button id="actionBtn" class="btn btn-primary">Start</button>
    <button id="stopBtn" class="btn btn-primary">Stop</button>

    <hr>

    <h2>Remaining time</h2>
    <div class="progress" style="height: 20px;">
    <div id="progressBar" class="progress-bar" style="width: 0%; transition: none;"></div>
    </div>
    <h1 id="timer">25:00</h1>

</div>

<script>

    const slider = document.getElementById("minutesSlider");
    const timer = document.getElementById("timer");
    const actionBtn = document.getElementById("actionBtn");
    const stopBtn = document.getElementById("stopBtn");
    const progressBar = document.getElementById("progressBar");

    let state = "STOPPED";
    let duration = 0;          // tempo total em ms
    let startTime = 0;         // quando iniciou
    let endTime = 0;          // 
    let remaining = 0;       // 
    let animationId = null;

    /* =========================
       RENDER (fonte única da verdade)
    ========================= */
    function render() {

        if (!endTime) return;

        const remaining = Math.max(0, endTime - Date.now());

        const total = Math.floor(remaining / 1000);
        const m = Math.floor(total / 60);
        const s = total % 60;

        timer.textContent =
            String(m).padStart(2, "0") + ":" +
            String(s).padStart(2, "0");
        
        const progress = ((duration - remaining) / duration) * 100;

        progressBar.style.width = Math.min(100, Math.max(0, progress)) + "%";

        if (remaining <= 0) {
            stop();
        }
    }

    /* =========================
       LOOP (1 único)
    ========================= */
    function loop() {
        render();
        animationId = requestAnimationFrame(loop);
    }

    function startLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    /* =========================
       START
    ========================= */
    actionBtn.addEventListener("click",  () => {

        if (state === "STOPPED"){

            duration = slider.value * 60 * 1000;
            startTime = Date.now();
            endTime = startTime + duration;
            

            state = "RUNNING";
            actionBtn.textContent = "Pause";
            slider.disabled = true;

            startLoop();

        } else if (state === "RUNNING") {

            remaining = endTime - Date.now(); 
            state = "PAUSED";

            cancelAnimationFrame(animationId);
            animationId = null;
            
            actionBtn.textContent = "Resume";

        }

        else if (state === "PAUSED") {

            endTime = Date.now() + remaining;

            state = "RUNNING";
            actionBtn.textContent = "Pause";


            startLoop();

        }
    });

    /* =========================
       STOP
    ========================= */
    stopBtn.addEventListener("click", stop);

    function stop() {

        state = "STOPPED";

        duration = 0;
        startTime = 0;
        endTime = 0;
        remaining = 0;

        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;

        slider.disabled = false;
        actionBtn.textContent = "Start";

        progressBar.style.width = "0%";
        timer.textContent = `${slider.value.padStart(2,"0")}:00`;
    }

    /* =========================
       SLIDER
    ========================= */
    slider.addEventListener("input", () => {
        if (state === "STOPPED") {
            timer.textContent = `${slider.value.padStart(2,"0")}:00`;
        }
    });

</script>

</body>
</html>
