<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro 3.0</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<style>


body{
    min-height:100vh;
    margin:0;
    background:linear-gradient(135deg,#DCE3E6,#b1abd2);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.container{
    max-width:480px;
    margin:0 auto;
    text-align:center;
}


#gif{
    display:block;
    margin:0 auto 0px auto;
    width:60px;
    height:auto;
    image-rendering:pixelated;
}


h1 {
    font-family: "Press Start 2P", system-ui;  
    padding: 0;
}


h1.logo{
    margin-top:20px;
    margin-bottom:75px;
    color:#af9db8;
    text-align: center;
    text-transform:uppercase;
    text-shadow:
        0 2px 0 #9f7db1,
        0 4px 0 #8b6aa0,
        0 8px 0 #2a0a3b;
    font-size: clamp(1.8rem, 10vw, 6rem);
    white-space: nowrap;
        
}


.card{
    background: rgb(255 255 255 / 35%);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* .card{
    background:#f5f5f5;

    padding:30px;

    box-shadow:
        0px 6px black,
        0px -6px black,
        6px 0px black,
        -6px 0px black,
        0px 12px #00000020;

    border-radius:0;
} */


.timer-container{
    position:relative;
    width:220px;
    height:220px;
    margin:0 auto 20px auto;
}

svg{
    transform:rotate(-90deg);
}

circle{
    fill:none;
    stroke-width:10;
}

.bg{
    stroke:#e9ecef;
    stroke-width: 12;
}

.progress{
    /* stroke:#2d22a9; */
    stroke:#9f7db1;
    stroke-linecap:round;
    transition:stroke-dashoffset .3s linear;
    stroke-width: 12;
}

.timer{
    font-family: "Press Start 2P", system-ui;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    font-weight:700;
}

.form-range{
    -webkit-appearance:none;
    appearance:none;

    width:100%;
    margin-top: 25px;
    margin-bottom: 15px;
}

.form-range::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    outline:none;


    width:15px;
    height:15px;

    background:#9f7db1 !important;

    border:none;
    border-radius:0;

    margin-top:-4px;

    box-shadow:
        0px 4px black,
        0px -4px black,
        4px 0px black,
        -4px 0px black,
        0px 6px #00000038,
        inset 0px 4px #ffffff36 !important;

    cursor:pointer;
}

.form-range:disabled {
    cursor: not-allowed;
}

.form-range:disabled::-webkit-slider-thumb{
    background: #7d7d7d !important;

    box-shadow:
        0px 4px #444,
        0px -4px #444,
        4px 0px #444,
        -4px 0px #444,
        0px 6px #00000020;
}

@font-face {
  font-family: "Press Start 2P";
  src: url("fonts/PressStart2P-Regular.ttf") format("truetype");
}

button {
    width: 100px;
    height: 60px;
    color: #fff;
    background-color: #6abc3a;
    padding: 15px 40px 15px 40px;
    margin: 20px;
    font-size: 20px;
    font-family: "Press Start 2P", system-ui;
    border: 0;
    box-shadow: 0px 5px black, 0px -5px black, 5px 0px black, -5px 0px black, 0px 10px #00000038, 5px 5px #00000038, -5px 5px #00000038, inset 0px 5px #ffffff36 ;
    cursor: pointer;
}

 button:active {
     transform: translateY(5px);
     box-shadow: 0px 5px black, 0px -5px black, 5px 0px black, -5px 0px black,inset 0px 5px #00000038;
}

</style>

<body>

    <h1 class="logo">Pomodoro</h1>

<div class="container">

    <div class="card">    

        <img id="gif"
            src="static/nukoPout.gif"
            alt="nukoWriting">

        <div class="timer-container">

            <svg width="220" height="220">
                <circle
                    class="bg"
                    cx="110"
                    cy="110"
                    r="100">
                </circle>

                <circle
                    id="progressCircle"
                    class="progress"
                    cx="110"
                    cy="110"
                    r="100">
                </circle>
            </svg>

            <div id="timer" class="timer">25:00</div>

        </div>

        <!-- <div class="mb-3"> -->
            <input
                id="minutesSlider"
                type="range"
                value="25"
                min="5"
                max="60"
                step="5"
                class="form-range">
        <!-- </div> -->

        <div class="buttons">
             <button id="actionBtn" style="background-color:#9f7db1;">▶</button>
            <button id="stopBtn" style="background-color:#9f7db1;">■</button>
        </div>
       
    </div>
</div>

<script>

    // Progress Circle
    const radius = 100;
    const circumference = 2 * Math.PI * radius;

    const progressCircle = document.getElementById("progressCircle");
    
    progressCircle.style.strokeDasharray = circumference;
    progressCircle.style.strokeDashoffset = circumference;

    const slider = document.getElementById("minutesSlider");
    const timer = document.getElementById("timer");
    const actionBtn = document.getElementById("actionBtn");
    const stopBtn = document.getElementById("stopBtn");
    const gif = document.getElementById("gif");


    let state = "STOPPED";
    let duration = 0;          // tempo total em ms
    let startTime = 0;         // quando iniciou
    let endTime = 0;                // 
    let animationId = null;

    /* =========================
       RENDER (fonte única da verdade)
    ========================= */
    function render() {

        if (!endTime) return;

        const remaining = Math.max(0, endTime - Date.now());

        const total = Math.floor(remaining / 1000);
        const m = Math.floor(total / 60);
        const s = total % 60;

        timer.textContent =
            String(m).padStart(2, "0") + ":" +
            String(s).padStart(2, "0");
        
        const progress = duration ? (1 - remaining / duration) * 100 : 0;

        // Progress Circle fill way
        const offset = circumference - (progress / 100) * circumference;
        progressCircle.style.strokeDashoffset = offset;
        
        if (remaining <= 0) {
            stop();
        }
    }

    /* =========================
       LOOP (1 único)
    ========================= */
    function loop() {
        render();
        animationId = requestAnimationFrame(loop);
    }

    function startLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    /* =========================
       START
    ========================= */

    actionBtn.addEventListener("click",  () => {

        if (state === "STOPPED"){

            duration = slider.value * 60 * 1000;
            startTime = Date.now();
            endTime = startTime + duration;
            

            state = "RUNNING";
            actionBtn.textContent = "❚❚";
            slider.disabled = true;
            document.getElementById('gif').src = 'static/nukoWriting.gif';

            startLoop();

        } else if (state === "RUNNING") {

            remaining = Math.max(0, endTime - Date.now());
            state = "PAUSED";

            cancelAnimationFrame(animationId);
            animationId = null;
            document.getElementById('gif').src = 'static/nukoSleepBlanket.gif';

            actionBtn.textContent = "▶";

        }

        else if (state === "PAUSED") {

            endTime = Date.now() + remaining;

            state = "RUNNING";
            actionBtn.textContent = "❚❚";
            document.getElementById('gif').src = 'static/nukoWriting.gif';


            startLoop();

        }
    });

    /* =========================
       STOP
    ========================= */
    stopBtn.addEventListener("click", stop);

    function stop() {

        state = "STOPPED";

        duration = 0;
        startTime = 0;
        endTime = 0;
        remaining = 0;

        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;

        slider.disabled = false;
        actionBtn.textContent = "▶";

        document.getElementById('gif').src = 'static/nukoAngry18.gif';

        progressCircle.style.strokeDashoffset = circumference;
        timer.textContent = `${slider.value.padStart(2,"0")}:00`;
    }

    /* =========================
       SLIDER
    ========================= */
    slider.addEventListener("input", () => {
        if (state === "STOPPED") {
            timer.textContent = `${slider.value.padStart(2,"0")}:00`;
        }
    });

</script>

</body>
</html>
